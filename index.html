<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>scharts</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Iosevka Aile", "IBM Plex Sans", sans-serif;
        background:
          radial-gradient(circle at top, rgba(251, 191, 36, 0.15), transparent 30%),
          linear-gradient(180deg, #020617, #111827);
        color: #e5e7eb;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(960px, 100%);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3.25rem);
        letter-spacing: -0.04em;
      }

      p {
        margin: 0 0 24px;
        color: #cbd5e1;
      }

      s-chart {
        height: 420px;
      }

      .status {
        margin-top: 12px;
        color: #fbbf24;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Streaming Binary Charts</h1>
      <p>Reference browser client for the length-prefixed HTTP protocol.</p>
      <s-chart></s-chart>
      <div class="status" data-status>Connecting…</div>
    </main>
    <script type="module" src="/browser-client.js"></script>
  </body>
  </html>
